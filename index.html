<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Travalgo — Experience Peace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="hero" role="main">
      <header class="header">
        <div class="header__inner">
          <div class="logo" aria-label="Travalgo">Travalgo</div>
          <nav class="nav" aria-label="Primary Navigation">
            <a href="#">Destination</a>
            <a href="#">Our Activity</a>
            <a href="#">Accompanied</a>
            <a href="#">Cruises</a>
            <a href="#">Who</a>
          </nav>
          <div class="header__contact">
            <a class="contact__item" href="mailto:travel@travalgo.com" aria-label="Email">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M2 6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6zm2 .5v.3l8 5.2 8-5.2v-.3H4zm16 2.7-7.4 4.8a2 2 0 0 1-2.2 0L3 9.2V18h17c.6 0 1-.4 1-1V9.2z"/></svg>
              <span>travel@travalgo.com</span>
            </a>
            <span class="header__divider"></span>
            <a class="contact__item" href="tel:+12025550123" aria-label="Phone">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M6.6 10.8a15.6 15.6 0 0 0 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1 .3 2 .5 3.1.5.7 0 1.3.6 1.3 1.3V20c0 .7-.6 1.3-1.3 1.3C9.8 21.3 2.7 14.2 2.7 5.3 2.7 4.6 3.3 4 4 4h3.2c.7 0 1.3.6 1.3 1.3 0 1 .2 2 .5 3.1.1.4 0 .9-.3 1.2l-2.1 2.2z"/></svg>
              <span>+1 202 555 0123</span>
            </a>
          </div>
        </div>
      </header>

      <div class="hero__rings"></div>
      <div class="hero__side-orb">
        <button class="pill" aria-label="Previous destination">
          <span class="pill__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.4 5.4 9.8 11l5.6 5.6-1.4 1.4L7 11l7-7 1.4 1.4z"/></svg>
          </span>
          <span class="pill__text">Kashmir</span>
        </button>
      </div>

      <section class="hero__content" aria-labelledby="hero-title">
        <h1 id="hero-title" class="hero__title">EXPERIENCE PEACE</h1>
        <h2 class="hero__subtitle">EXPLORE HERITAGE</h2>
        <div class="hero__slides" aria-label="Slide navigation">
          <button class="is-active">01</button>
          <button>02</button>
          <button>03</button>
          <button>04</button>
          <button>05</button>
        </div>
      </section>

      <form class="searchbar" role="search" action="#" method="get">
        <div class="filters">
          <div class="filter">
            <span class="filter__icon">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 2a7 7 0 0 1 7 7c0 5.2-7 13-7 13S5 14.2 5 9a7 7 0 0 1 7-7zm0 9.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/></svg>
            </span>
            <span class="filter__label">Destination</span>
          </div>
          <div class="filter">
            <span class="filter__icon">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 2l3.1 6.2L22 9.3l-5 4.8 1.2 6.9L12 17.7 5.8 21l1.2-6.9L2 9.3l6.9-1.1L12 2z"/></svg>
            </span>
            <span class="filter__label">Activities &amp; Themes</span>
          </div>
          <div class="filter">
            <span class="filter__icon">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 3C7 3 3 6.6 3 11s4 8 9 8 9-3.6 9-8-4-8-9-8zm0 14c-3.3 0-6-2.2-6-5s2.7-5 6-5 6 2.2 6 5-2.7 5-6 5z"/></svg>
            </span>
            <span class="filter__label">Average Price</span>
          </div>
        </div>

        <label class="searchbar__field">
          <span class="searchbar__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.9.9l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/></svg>
          </span>
          <input type="search" name="q" placeholder="Search" aria-label="Search" />
        </label>
      </form>

      <div class="corner-star" aria-hidden="true"></div>
    </main>

    <script src="/assets/js/main.js"></script>
  </body>
  <!-- Background image credit: Unsplash (royalty-free). Replace in CSS variable if desired. -->
</html>
